name: Documentation Improvement
description: Report unclear docs or suggest improvements to README, guides, or examples.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for README, CONTRIBUTING, SECURITY, ARCHITECTURE, ROADMAP, or `docs/` improvements.

  - type: dropdown
    id: location
    attributes:
      label: Document
      options:
        - README.md
        - docs/GettingStarted.md
        - docs/Configuration.md
        - docs/AI.md
        - docs/Troubleshooting.md
        - ARCHITECTURE.md
        - ROADMAP.md
        - CONTRIBUTING.md
        - SECURITY.md
        - CHANGELOG.md
        - Other / missing page
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
      placeholder: The installation section does not mention installing from GitHub...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional rewrite, outline, or examples you would find helpful.

  - type: textarea
    id: audience
    attributes:
      label: Who is affected?
      description: New adopters, contributors, AI users, etc.
      placeholder: Rails developers installing the gem from Git for the first time.
