name: Feature Request
description: Suggest a new capability or improvement for BugSage.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want to solve and a proposed approach.
        Please read [CONTRIBUTING.md](https://github.com/MONARCHKOLI/bugsage/blob/master/CONTRIBUTING.md) before opening large feature PRs.

  - type: checkboxes
    id: before
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for similar requests
          required: true
        - label: I considered whether this belongs in documentation or configuration instead of new code
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or gap are you trying to address?
      placeholder: API 400 responses are hard to inspect alongside exceptions...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should BugSage behave?
      placeholder: Capture HTTP status >= 400 in the session store without changing the response body...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or why existing options are not enough.
      placeholder: Relying only on log/development.log; wrapping every controller in rescue_from...

  - type: dropdown
    id: impact
    attributes:
      label: Default experience impact
      description: Would this change zero-config defaults for existing apps?
      options:
        - No — opt-in only
        - Yes — changes default behavior
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: Rules / exception classification
        - label: Error page UI
        - label: Dashboard
        - label: HTTP capture
        - label: AI / code patches
        - label: Configuration / Railtie
        - label: CLI / installer
        - label: Documentation
        - label: Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, or related issues.
